name: Full CI/CD Pipeline

on:
  push:
    branches:
      - b1

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Pull latest code
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ 3. Install ALL dependencies (frontend + backend)
      - name: Install all dependencies
        run: |
          cd server && npm install
          cd ../client && npm install

      # ✅ 4. Run ALL tests (frontend + backend)
      - name: Run all tests
        run: |
          cd server && npm test || echo "No backend tests"
          cd ../client && npm test -- --watchAll=false || echo "No frontend tests"

      # ✅ 5. Build project (frontend)
      - name: Build project
        run: |
          cd client && npm run build

      # ✅ 6. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ✅ 7. Build Docker Image (validation only)
      - name: Build Docker Image
        run: docker build -t placement-tracker:latest ./server

      # ✅ 8. Trigger deployment on Render
      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
